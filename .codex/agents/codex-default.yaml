apiVersion: ao.dev/v1
kind: AgentManifest
metadata:
  name: codex-default
  description: Default Codex CLI agent for AO Operator bounded workspace runs.
spec:
  capabilities:
    - code-read
    - code-write
    - shell
  transport: cli
  command:
    - codex
    - exec
    - --model
    - gpt-5.5
    - --json
    - --skip-git-repo-check
    - --sandbox
    - workspace-write
