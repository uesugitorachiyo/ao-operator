<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">AO Operator app SDD evidence result</title>
  <desc id="desc">The AO Operator app SDD flow ends with runnable artifacts, verification evidence, and cross-platform checks.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}
      .card{fill:#ffffff;stroke:#d7dee8;stroke-width:2}
      .dark{fill:#111827}
      .ok{fill:#dcfce7;stroke:#22c55e;stroke-width:2}
      .info{fill:#e0f2fe;stroke:#38bdf8;stroke-width:2}
      .h{font:800 40px Inter,Arial,sans-serif;fill:#111827}
      .p{font:500 21px Inter,Arial,sans-serif;fill:#4b5563}
      .label{font:800 20px Inter,Arial,sans-serif;fill:#111827}
      .small{font:500 16px Inter,Arial,sans-serif;fill:#4b5563}
      .darklabel{font:800 20px Inter,Arial,sans-serif;fill:#ffffff}
      .darksmall{font:500 16px Inter,Arial,sans-serif;fill:#d1d5db}
    </style>
  </defs>
  <rect class="bg" width="1200" height="720"/>
  <text class="h" x="72" y="84">3. Finished work comes back with proof</text>
  <text class="p" x="72" y="126">The value is not the transcript. It is the deliverable plus evidence that the task was carried out.</text>

  <rect class="card" x="72" y="184" width="318" height="330" rx="18"/>
  <text class="label" x="110" y="236">Citation audit result</text>
  <text class="small" x="110" y="286">material claims</text>
  <text class="small" x="110" y="322">source matches</text>
  <text class="small" x="110" y="358">unsupported flags</text>
  <text class="small" x="110" y="394">review-stage report</text>
  <text class="small" x="110" y="430">synthetic source pack</text>

  <rect class="ok" x="442" y="184" width="318" height="330" rx="18"/>
  <text class="label" x="480" y="236">Verification evidence</text>
  <text class="small" x="480" y="286">tests or scripted checks</text>
  <text class="small" x="480" y="322">screenshots</text>
  <text class="small" x="480" y="358">review notes</text>
  <text class="small" x="480" y="394">closure decision</text>
  <text class="small" x="480" y="430">status directory</text>

  <rect class="info" x="812" y="184" width="318" height="330" rx="18"/>
  <text class="label" x="850" y="236">Cross-platform proof</text>
  <text class="small" x="850" y="286">macOS local flow</text>
  <text class="small" x="850" y="322">Ubuntu script proof</text>
  <text class="small" x="850" y="358">native Windows path check</text>
  <text class="small" x="850" y="394">host-specific notes</text>
  <text class="small" x="850" y="430">rerun command</text>

  <rect class="dark" x="184" y="584" width="832" height="62" rx="31"/>
  <text class="darklabel" x="236" y="622">Output is accepted only when the evaluator-closer can inspect the evidence.</text>
</svg>
