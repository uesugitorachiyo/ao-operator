<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">AO Operator plugin and adapter stack</title>
  <desc id="desc">OpenClaw, Hermes, Codex, Claude, MCP, and A2A enter through AO Operator and AO Runtime boundaries with policy, events, and evidence.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}
      .box{fill:#ffffff;stroke:#243447;stroke-width:2}
      .front{fill:#eef6ff;stroke:#2563eb;stroke-width:2}
      .operator{fill:#f0fdf4;stroke:#047857;stroke-width:2}
      .runtime{fill:#fff7ed;stroke:#c2410c;stroke-width:2}
      .artifact{fill:#f5f3ff;stroke:#7c3aed;stroke-width:2}
      .text{font-family:Arial,Helvetica,sans-serif;fill:#111827;font-size:18px}
      .small{font-size:14px;fill:#374151}
      .line{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="1120" height="560"/>
  <text class="text" x="54" y="48">Front doors</text>
  <rect class="front" x="45" y="70" width="210" height="78" rx="8"/>
  <text class="text" x="98" y="104">OpenClaw</text>
  <text class="small" x="72" y="128">chat, cron, webhooks</text>
  <rect class="front" x="45" y="180" width="210" height="78" rx="8"/>
  <text class="text" x="108" y="214">Hermes</text>
  <text class="small" x="74" y="238">queue, allocate, synthesize</text>
  <rect class="front" x="45" y="290" width="210" height="78" rx="8"/>
  <text class="text" x="86" y="324">Codex / Claude</text>
  <text class="small" x="74" y="348">local OAuth CLI auth</text>
  <rect class="front" x="45" y="400" width="210" height="78" rx="8"/>
  <text class="text" x="98" y="434">MCP / A2A</text>
  <text class="small" x="78" y="458">tools and remote peers</text>

  <rect class="operator" x="350" y="120" width="245" height="300" rx="10"/>
  <text class="text" x="418" y="160">AO Operator</text>
  <text class="small" x="382" y="198">contract</text>
  <text class="small" x="382" y="228">gate</text>
  <text class="small" x="382" y="258">route</text>
  <text class="small" x="382" y="288">evaluate</text>
  <text class="small" x="382" y="318">report</text>
  <text class="small" x="382" y="362">role artifacts</text>
  <text class="small" x="382" y="392">evaluator closure</text>

  <rect class="runtime" x="690" y="70" width="270" height="190" rx="10"/>
  <text class="text" x="772" y="110">AO Runtime</text>
  <text class="small" x="728" y="148">RunSpec DAG scheduler</text>
  <text class="small" x="728" y="178">policy decisions</text>
  <text class="small" x="728" y="208">provider launch</text>
  <text class="small" x="728" y="238">event stream</text>
  <rect class="artifact" x="690" y="315" width="270" height="145" rx="10"/>
  <text class="text" x="748" y="355">Evidence Boundary</text>
  <text class="small" x="730" y="392">prompts, events, artifacts</text>
  <text class="small" x="730" y="422">signed packs and replay</text>

  <path class="line" d="M255 109 C300 109 310 170 350 190"/>
  <path class="line" d="M255 219 C300 219 310 235 350 255"/>
  <path class="line" d="M255 329 C302 329 312 314 350 302"/>
  <path class="line" d="M255 439 C310 439 318 382 350 350"/>
  <path class="line" d="M595 255 H690"/>
  <path class="line" d="M825 260 V315"/>
  <path class="line" d="M690 388 C630 460 420 462 350 390"/>

  <text class="small" x="373" y="468">AO Operator keeps workflow semantics stable even when the front door changes.</text>
</svg>
