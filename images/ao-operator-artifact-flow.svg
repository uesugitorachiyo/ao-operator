<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="420" viewBox="0 0 1120 420" role="img" aria-labelledby="title desc">
  <title id="title">AO Operator artifact flow</title>
  <desc id="desc">Scoped context becomes task artifacts, which flow through review, integration, and evaluator closure.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.box{fill:#ffffff;stroke:#243447;stroke-width:2}.artifact{fill:#ecfdf5;stroke:#047857;stroke-width:2}.text{font-family:Arial,Helvetica,sans-serif;fill:#111827;font-size:17px}.small{font-size:14px;fill:#374151}.line{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="1120" height="420"/>
  <rect class="box" x="55" y="80" width="190" height="90" rx="8"/>
  <text class="text" x="92" y="120">Scoped Input</text>
  <text class="small" x="85" y="148">reads, writes, criteria</text>
  <rect class="box" x="325" y="55" width="190" height="90" rx="8"/>
  <text class="text" x="370" y="95">Agent Task</text>
  <text class="small" x="357" y="123">provider-bound role</text>
  <rect class="artifact" x="325" y="205" width="190" height="90" rx="8"/>
  <text class="text" x="366" y="245">Artifacts</text>
  <text class="small" x="350" y="273">diffs, logs, evidence</text>
  <rect class="box" x="595" y="130" width="190" height="90" rx="8"/>
  <text class="text" x="646" y="170">Review</text>
  <text class="small" x="627" y="198">findings and fixes</text>
  <rect class="box" x="865" y="80" width="190" height="90" rx="8"/>
  <text class="text" x="912" y="120">Integrate</text>
  <text class="small" x="900" y="148">combine accepted work</text>
  <rect class="artifact" x="865" y="235" width="190" height="90" rx="8"/>
  <text class="text" x="900" y="275">Closure Evidence</text>
  <text class="small" x="910" y="303">tests and acceptance</text>
  <path class="line" d="M245 125 H325"/>
  <path class="line" d="M420 145 V205"/>
  <path class="line" d="M515 250 C560 240 570 205 595 185"/>
  <path class="line" d="M785 175 C825 165 835 130 865 125"/>
  <path class="line" d="M960 170 V235"/>
</svg>

