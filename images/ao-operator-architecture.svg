<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">AO Operator architecture</title>
  <desc id="desc">User enters AO Operator, roles resolve providers, AO Runtime executes a DAG with policy gates, workspaces, artifacts, and evaluator closure.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.box{fill:#ffffff;stroke:#243447;stroke-width:2}.accent{fill:#e8f4ff;stroke:#2563eb;stroke-width:2}.gate{fill:#fff7ed;stroke:#c2410c;stroke-width:2}.artifact{fill:#ecfdf5;stroke:#047857;stroke-width:2}.text{font-family:Arial,Helvetica,sans-serif;fill:#111827;font-size:18px}.small{font-size:14px;fill:#374151}.line{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="1120" height="560"/>
  <rect class="box" x="40" y="210" width="150" height="90" rx="8"/>
  <text class="text" x="88" y="250">User</text>
  <text class="small" x="62" y="275">task intent</text>
  <rect class="accent" x="250" y="70" width="240" height="380" rx="8"/>
  <text class="text" x="302" y="110">AO Operator</text>
  <text class="small" x="282" y="145">planner-intake</text>
  <text class="small" x="282" y="178">plan-hardener</text>
  <text class="small" x="282" y="211">factory-manager</text>
  <text class="small" x="282" y="244">implementer</text>
  <text class="small" x="282" y="277">slice-reviewer</text>
  <text class="small" x="282" y="310">integrator</text>
  <text class="small" x="282" y="343">evaluator-closer</text>
  <text class="small" x="282" y="390">scoped context only</text>
  <rect class="box" x="550" y="70" width="190" height="115" rx="8"/>
  <text class="text" x="587" y="110">.env</text>
  <text class="small" x="580" y="140">role provider map</text>
  <text class="small" x="580" y="165">claude | codex</text>
  <rect class="gate" x="550" y="225" width="190" height="115" rx="8"/>
  <text class="text" x="588" y="265">Policy Gate</text>
  <text class="small" x="580" y="295">OAuth CLI only</text>
  <text class="small" x="580" y="320">no API keys</text>
  <rect class="accent" x="800" y="70" width="260" height="140" rx="8"/>
  <text class="text" x="865" y="110">AO Runtime</text>
  <text class="small" x="835" y="145">RunSpec DAG scheduler</text>
  <text class="small" x="835" y="172">events, retries, fan-in</text>
  <rect class="box" x="800" y="250" width="260" height="95" rx="8"/>
  <text class="text" x="848" y="288">Workspaces</text>
  <text class="small" x="835" y="318">isolated slices</text>
  <rect class="artifact" x="800" y="385" width="260" height="95" rx="8"/>
  <text class="text" x="862" y="423">Artifacts</text>
  <text class="small" x="835" y="453">handoffs and evidence</text>
  <path class="line" d="M190 255 H250"/>
  <path class="line" d="M490 128 H550"/>
  <path class="line" d="M645 185 V225"/>
  <path class="line" d="M740 282 H800"/>
  <path class="line" d="M930 210 V250"/>
  <path class="line" d="M930 345 V385"/>
  <path class="line" d="M800 432 C690 492 460 498 370 450"/>
</svg>

