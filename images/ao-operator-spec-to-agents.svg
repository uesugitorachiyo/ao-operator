<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">AO Operator spec to agent team flow</title>
  <desc id="desc">An ingestible SDD or brief becomes a profile, role graph, RunSpec, role artifacts, and closure evidence.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0d1621"/>
      <stop offset="1" stop-color="#1d2d3a"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#8bd7ff"/>
    </marker>
    <style>
      .h{font:700 38px system-ui,-apple-system,Segoe UI,sans-serif;fill:#f8fbff}
      .p{font:500 19px system-ui,-apple-system,Segoe UI,sans-serif;fill:#b6cce2}
      .box{fill:#fff;stroke:#d7e3ec;stroke-width:2}
      .blue{fill:#ecf7ff;stroke:#8bd7ff;stroke-width:2}
      .green{fill:#effbea;stroke:#91dd86;stroke-width:2}
      .gold{fill:#fff8e8;stroke:#f2bc66;stroke-width:2}
      .t{font:700 20px system-ui,-apple-system,Segoe UI,sans-serif;fill:#17212b}
      .s{font:500 15px system-ui,-apple-system,Segoe UI,sans-serif;fill:#536577}
      .line{stroke:#8bd7ff;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1200" height="520" fill="url(#bg)"/>
  <text x="54" y="72" class="h">From Spec To Local Agent Team</text>
  <text x="54" y="108" class="p">Paste a brief or SDD. AO Operator turns it into scoped roles instead of one giant prompt.</text>

  <rect x="54" y="170" width="178" height="126" rx="12" class="box"/>
  <text x="82" y="220" class="t">Spec / SDD</text>
  <text x="82" y="252" class="s">goal, scope, risks</text>
  <path class="line" d="M240 233 H304"/>

  <rect x="322" y="170" width="178" height="126" rx="12" class="blue"/>
  <text x="350" y="220" class="t">Profile</text>
  <text x="350" y="252" class="s">choose role chain</text>
  <path class="line" d="M508 233 H572"/>

  <rect x="590" y="170" width="178" height="126" rx="12" class="green"/>
  <text x="618" y="220" class="t">Role Graph</text>
  <text x="618" y="252" class="s">planner, reviewer...</text>
  <path class="line" d="M776 233 H840"/>

  <rect x="858" y="170" width="178" height="126" rx="12" class="gold"/>
  <text x="886" y="220" class="t">RunSpec</text>
  <text x="886" y="252" class="s">portable workflow</text>
  <path class="line" d="M1044 233 H1080"/>

  <rect x="1090" y="170" width="80" height="126" rx="12" class="box"/>
  <text x="1112" y="220" class="t">Run</text>
  <text x="1110" y="252" class="s">evidence</text>

  <rect x="110" y="370" width="980" height="66" rx="33" fill="#142536" stroke="#33516b"/>
  <text x="154" y="411" class="p">Optimization: each role receives only the context it needs and leaves a handoff artifact for the next role.</text>
</svg>
