<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 800" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#166534"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#991b1b"/>
    </marker>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1120" height="800" fill="#f8fafc"/>

  <text x="560" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">AO Operator Fan-out Topology</text>
  <text x="560" y="60" text-anchor="middle" font-size="13" fill="#475569">Spec Forge + Ralph Loop gates first; AO then isolates branches, runs independent factories in parallel, and fans in structured artifacts.</text>

  <rect x="36" y="92" width="452" height="596" rx="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
  <text x="262" y="124" text-anchor="middle" font-size="18" font-weight="700" fill="#7c2d12">Tightly Coupled ai-teams</text>
  <text x="262" y="146" text-anchor="middle" font-size="12" fill="#9a3412">single shared context, serialized handoffs, growing transcript</text>

  <g filter="url(#soft-shadow)">
    <rect x="146" y="174" width="232" height="54" rx="8" fill="#ffedd5" stroke="#c2410c" stroke-width="2"/>
    <text x="262" y="197" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">Planner</text>
    <text x="262" y="215" text-anchor="middle" font-size="11" fill="#9a3412">scope and plan in one thread</text>
  </g>
  <line x1="262" y1="228" x2="262" y2="254" stroke="#991b1b" stroke-width="2" marker-end="url(#arrow-red)"/>

  <g filter="url(#soft-shadow)">
    <rect x="146" y="258" width="232" height="54" rx="8" fill="#ffedd5" stroke="#c2410c" stroke-width="2"/>
    <text x="262" y="281" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">Plan Hardener</text>
    <text x="262" y="299" text-anchor="middle" font-size="11" fill="#9a3412">must carry all context forward</text>
  </g>
  <line x1="262" y1="312" x2="262" y2="338" stroke="#991b1b" stroke-width="2" marker-end="url(#arrow-red)"/>

  <g filter="url(#soft-shadow)">
    <rect x="122" y="342" width="280" height="126" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="262" y="367" text-anchor="middle" font-size="14" font-weight="700" fill="#7f1d1d">Shared Implementer Loop</text>
    <text x="262" y="389" text-anchor="middle" font-size="11" fill="#991b1b">contract slice</text>
    <text x="262" y="411" text-anchor="middle" font-size="11" fill="#991b1b">backend slice</text>
    <text x="262" y="433" text-anchor="middle" font-size="11" fill="#991b1b">frontend slice</text>
    <text x="262" y="455" text-anchor="middle" font-size="11" fill="#991b1b">quality and docs slices</text>
  </g>
  <line x1="262" y1="468" x2="262" y2="494" stroke="#991b1b" stroke-width="2" marker-end="url(#arrow-red)"/>

  <g filter="url(#soft-shadow)">
    <rect x="122" y="498" width="280" height="82" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="262" y="523" text-anchor="middle" font-size="14" font-weight="700" fill="#7f1d1d">Review and Closure</text>
    <text x="262" y="545" text-anchor="middle" font-size="11" fill="#991b1b">reviewers wait for shared loop</text>
    <text x="262" y="563" text-anchor="middle" font-size="11" fill="#991b1b">evaluator reconstructs intent from chat</text>
  </g>

  <rect x="76" y="608" width="372" height="48" rx="6" fill="#ffffff" stroke="#fdba74"/>
  <text x="262" y="629" text-anchor="middle" font-size="12" font-weight="700" fill="#7c2d12">Critical path: planner + hardener + 5 slices + reviewers + closer</text>
  <text x="262" y="647" text-anchor="middle" font-size="11" fill="#9a3412">Throughput bottleneck: one coupled conversation and serialized context</text>

  <rect x="632" y="92" width="452" height="596" rx="10" fill="#ecfdf5" stroke="#bbf7d0" stroke-width="2"/>
  <text x="858" y="124" text-anchor="middle" font-size="18" font-weight="700" fill="#14532d">AO Operator with AO Runtime Orchestration</text>
  <text x="858" y="146" text-anchor="middle" font-size="12" fill="#166534">mixed-throughput default; every agent still selectable in .env</text>

  <g filter="url(#soft-shadow)">
    <rect x="742" y="174" width="232" height="54" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="858" y="197" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">Planner -> Spec Forge -> Ralph Loop</text>
    <text x="858" y="215" text-anchor="middle" font-size="11" fill="#166534">Claude OAuth CLI by default for contract and critique gates</text>
  </g>
  <line x1="858" y1="228" x2="858" y2="260" stroke="#166534" stroke-width="2" marker-end="url(#arrow-green)"/>

  <rect x="666" y="266" width="384" height="184" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
  <text x="858" y="290" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">Wave 2: Factory Manager Dispatches Five Codex Factories</text>

  <g font-size="11">
    <rect x="690" y="312" width="144" height="46" rx="7" fill="#eff6ff" stroke="#2563eb"/>
    <text x="762" y="331" text-anchor="middle" font-weight="700" fill="#1e3a8a">contract-factory</text>
    <text x="762" y="348" text-anchor="middle" fill="#1e40af">Codex default</text>

    <rect x="882" y="312" width="144" height="46" rx="7" fill="#eff6ff" stroke="#2563eb"/>
    <text x="954" y="331" text-anchor="middle" font-weight="700" fill="#1e3a8a">backend-factory</text>
    <text x="954" y="348" text-anchor="middle" fill="#1e40af">Codex default</text>

    <rect x="690" y="374" width="144" height="46" rx="7" fill="#eff6ff" stroke="#2563eb"/>
    <text x="762" y="393" text-anchor="middle" font-weight="700" fill="#1e3a8a">frontend-factory</text>
    <text x="762" y="410" text-anchor="middle" fill="#1e40af">Codex default</text>

    <rect x="882" y="374" width="144" height="46" rx="7" fill="#eff6ff" stroke="#2563eb"/>
    <text x="954" y="393" text-anchor="middle" font-weight="700" fill="#1e3a8a">quality-factory</text>
    <text x="954" y="410" text-anchor="middle" fill="#1e40af">Codex default</text>

    <rect x="786" y="436" width="144" height="46" rx="7" fill="#eff6ff" stroke="#2563eb"/>
    <text x="858" y="455" text-anchor="middle" font-weight="700" fill="#1e3a8a">docs-factory</text>
    <text x="858" y="472" text-anchor="middle" fill="#1e40af">Codex default</text>
  </g>

  <line x1="762" y1="358" x2="762" y2="500" stroke="#166534" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="954" y1="358" x2="954" y2="500" stroke="#166534" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="762" y1="420" x2="762" y2="500" stroke="#166534" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="954" y1="420" x2="954" y2="500" stroke="#166534" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="858" y1="482" x2="858" y2="500" stroke="#166534" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <g filter="url(#soft-shadow)">
    <rect x="666" y="504" width="384" height="62" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="858" y="529" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">Wave 3: Parallel Claude Reviewers</text>
    <text x="858" y="549" text-anchor="middle" font-size="11" fill="#166534">Claude default for critique; exact .env keys can switch any reviewer</text>
  </g>
  <line x1="858" y1="566" x2="858" y2="594" stroke="#166534" stroke-width="2" marker-end="url(#arrow-green)"/>

  <g filter="url(#soft-shadow)">
    <rect x="666" y="598" width="384" height="58" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="858" y="621" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">Integrator + Evaluator/Closer</text>
    <text x="858" y="640" text-anchor="middle" font-size="11" fill="#166534">fan-in validated artifacts, AO event log, explicit blockers</text>
  </g>

  <path d="M 488 390 C 540 390 574 390 632 390" fill="none" stroke="#334155" stroke-width="2" stroke-dasharray="8,5" marker-end="url(#arrow)"/>
  <text x="560" y="374" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">replace coupling with DAG isolation</text>

  <g font-size="11">
    <rect x="520" y="614" width="18" height="14" rx="3" fill="#eff6ff" stroke="#2563eb"/>
    <text x="546" y="626" fill="#475569">Codex default implementer branch</text>
    <rect x="520" y="638" width="18" height="14" rx="3" fill="#f0fdf4" stroke="#16a34a"/>
    <text x="546" y="650" fill="#475569">Claude default review or closure branch</text>
  </g>

  <g filter="url(#soft-shadow)">
    <rect x="156" y="696" width="808" height="46" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="560" y="716" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">AO Operator support layer: vendored skills + read-only llm-wiki lookup</text>
    <text x="560" y="733" text-anchor="middle" font-size="11" fill="#475569">factory-intake, Spec Forge contracting, context offload, closure verification, mission monitor ops, and promoted durable wiki lessons</text>
  </g>

  <text x="560" y="774" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Expected win: pay Spec Forge/Ralph once, then wall-clock trends with the slowest branch plus fan-in.</text>
</svg>
